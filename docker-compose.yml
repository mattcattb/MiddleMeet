services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-middle_meetup}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-middle_meetup}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.35.1
    restart: unless-stopped
    command:
      [
        "dragonfly",
        "--bind",
        "0.0.0.0",
        "--proactor_threads=1",
        "--maxmemory=256mb",
      ]
    ports:
      - "16379:6379"

volumes:
  postgres-data:
